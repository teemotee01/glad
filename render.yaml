services:
  - type: web
    name: nexus-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://your-site.netlify.app
      - key: NODE_ENV
        value: production
